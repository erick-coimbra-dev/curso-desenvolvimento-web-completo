<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de Textos</title>
</head>
<body>
    <!--
    <b>(bold - negrito) representa um texto diferente do normal
    <strong>(forte) representa um texto com importância
    <em>(emphasis - ênfase) coloca alguma êfase no texto
    <mark>(marca) representa o texto marcado
    -->
<h2>Formatação de Textos</h2>
Esse é um texto <b>negrito</b> <br>
Esse é um texto <strong>importante</strong> <br>
Esse é um texto <i>itálico</i> <br>
Esse é um texto <em>com ênfase</em> <br>
Esse é um texto <mark>marcado</mark> <br>
<!--
<u>(underline - sublinhado) representa um texto sublinhado
<del>(deleted - excluído) representa um texto excluído
-->
    Esse é um texto <u>sublinhado</u> <br>
    Esse é um texto <del>excluído</del> <br>
    <!--
    <sup>Superscript text - sobrescrito
    <sub(Subscript text - subscrito)
    -->
    <h2>Diferentes tipos de caracteres</h2>
    Sobrescrito: 10<sup>2</sup> <br>
    Subscrito: H<sub>2</sub>O <br>
    
</body>
</html>
